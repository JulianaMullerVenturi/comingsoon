<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Vector Background</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pre-rendered 4K background video (3840×2160, 30fps, 8s seamless loop) -->
    <!-- Hardware-decoded H.264 — replaces all SVG filter rendering -->
    <video id="bg-video" autoplay loop muted playsinline
           preload="auto">
        <source src="background_loop.mp4" type="video/mp4">
    </video>

    <script src="script.js"></script>

    <!-- Glass Stencil Layer (Information Block) -->
    <div class="glass-stencil" id="info-block">
        <div class="keywords-grid">
            <div class="keyword-row">
                <div class="keyword-pill">AI-POWERED LEARNING</div>
                <div class="keyword-pill">IMMERSIVE SIMULATIONS</div>
            </div>
            <div class="keyword-row">
                <div class="keyword-pill">HUMAN-CENTERED DEVELOPMENT</div>
                <div class="keyword-pill">PERFORMANCE TECH</div>
            </div>
        </div>
        
        <div class="employee-names">
            <div class="names-row">
                <span class="name">Arno Wouters</span>
                <span class="separator">|</span>
                <span class="name">Jeroen Krouwels</span>
                <span class="separator">|</span>
                <span class="name">Ardie van Honk</span>
                <span class="separator">|</span>
                <span class="name">Renata van Dijken</span>
            </div>
            <div class="names-row">
                <span class="name">Jeroen Schilders</span>
                <span class="separator">|</span>
                <span class="name">Norma Wouters-Snell</span>
                <span class="separator">|</span>
                <span class="name">Juliana Venturi</span> & more
            </div>
        </div>
    </div>



    <!-- Countdown Container -->
    <div class="countdown-container" id="countdown">
        <div class="countdown-unit" id="unit-days">
            <div class="digits-container">
                <div class="digit-wrapper tens" id="days-tens"><div class="digit current">3</div></div>
                <div class="digit-wrapper ones" id="days-ones"><div class="digit current">0</div></div>
            </div>
            <div class="countdown-label">DAYS</div>
        </div>
        <div class="countdown-unit" id="unit-hours">
            <div class="digits-container">
                <div class="digit-wrapper tens" id="hours-tens"><div class="digit current">0</div></div>
                <div class="digit-wrapper ones" id="hours-ones"><div class="digit current">6</div></div>
            </div>
            <div class="countdown-label">HOURS</div>
        </div>
        <div class="countdown-unit" id="unit-minutes">
            <div class="digits-container">
                <div class="digit-wrapper tens" id="minutes-tens"><div class="digit current digit-one">1</div></div>
                <div class="digit-wrapper ones" id="minutes-ones"><div class="digit current digit-one">1</div></div>
            </div>
            <div class="countdown-label">MINUTES</div>
        </div>
        <div class="countdown-unit" id="unit-seconds">
            <div class="digits-container">
                <div class="digit-wrapper tens" id="seconds-tens"><div class="digit current">3</div></div>
                <div class="digit-wrapper ones" id="seconds-ones"><div class="digit current">9</div></div>
            </div>
            <div class="countdown-label">SECONDS</div>
        </div>
    </div>

    <!-- Custom UI Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>

</body>
</html>
